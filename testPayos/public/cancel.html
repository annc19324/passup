<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán bị hủy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 3rem; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        .icon { font-size: 4rem; color: #EF4444; margin-bottom: 1rem; }
        h1 { margin: 0 0 1rem; }
        a { color: #0066FF; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✕</div>
        <h1>Đã hủy</h1>
        <p>Bạn đã hủy quá trình thanh toán.</p>
        <a href="/">Thử lại</a>
    </div>
</body>
</html>
